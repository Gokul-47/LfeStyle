<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found | Stackly</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .notfound-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: var(--black);
      color: var(--white);
      text-align: center;
      padding: 2rem;
    }
    .notfound-title {
      font-size: 5rem;
      font-family: var(--font-display);
      font-weight: 700;
      margin-bottom: 1rem;
      letter-spacing: -0.04em;
    }
    .notfound-message {
      font-size: 1.3rem;
      color: var(--gray-400);
      margin-bottom: 2.5rem;
    }
    .notfound-btn {
      background: var(--white);
      color: var(--black);
      border: none;
      padding: 0.9rem 2.2rem;
      border-radius: 2rem;
      font-size: 1.1rem;
      font-family: var(--font-body);
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      box-shadow: 0 2px 16px 0 rgba(0,0,0,0.08);
    }
    .notfound-btn:hover {
      background: var(--gray-200);
      color: var(--black);
    }
    .notfound-logo {
      margin-bottom: 2.5rem;
    }
  </style>
</head>
<body>
  <div class="notfound-container">
    <div class="notfound-logo logo-combo">
      <img src="assets/logo.webp" alt="Stackly logo" class="logo-img-white" style="height: 48px;">
      <span class="logo-text" style="font-size:2.2rem;">Stackly</span>
    </div>
    <div class="notfound-title">404</div>
    <div class="notfound-message">Sorry, the page you are looking for does not exist.<br>It may have been moved or deleted.</div>
    <a href="index.html" class="notfound-btn">Go to Home</a>
  </div>
</body>
</html>
